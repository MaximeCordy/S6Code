<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Autoportrait</title>
    <link rel="stylesheet" href="scss/main.scss" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@barba/core@2.9.7/dist/barba.umd.js"></script>
  </head>
  <body>
    <canvas></canvas>
    <a href="index.html" class="site-logo">
      <img src="image/logo_sticker.png" alt="Logo" />
    </a>
    <div id="scroll-progress"><div id="scroll-progress-bar"></div></div>
    <button id="audio-toggle" class="hidden" aria-label="Audio">♪</button>
    <button id="info-toggle">i</button>
    <div class="panel-backdrop"></div>
    <aside id="info-panel">
      <div class="ip-head">
        <div>Œuvres de la section</div>
        <div class="ip-title" id="ip-title">—</div>
      </div>
      <div class="ip-body" id="ip-body"></div>
    </aside>

    <div class="transition-overlay">
      <div class="logo-placeholder">
        <img src="image/logo_sticker.png" alt="Logo" />
      </div>
    </div>

    <!-- Barba Wrapper -->
    <div data-barba="wrapper">
      <div data-barba="container" data-barba-namespace="autoportrait">
        <div class="page page-autoportrait">
          <header>
            <a href="index.html">index</a>
            <a href="dante.html">dante</a>
            <a href="conversation.html">conversation</a>
            <a href="maladie.html">maladie</a>
            <a href="autoportrait.html">autoportrait</a>
          </header>
          <div class="bg"></div>

          <div class="vertical-line-svg left">
            <svg viewBox="0 0 100 800" preserveAspectRatio="none">
              <path
                class="line-path"
                d="M50,0 Q50,400 50,800"
                stroke="#313131"
                stroke-width="3"
                fill="none"
              />
              <path
                class="line-hit"
                d="M50,0 Q50,400 50,800"
                stroke="transparent"
                stroke-width="40"
                fill="none"
              />
            </svg>
          </div>
          <div class="vertical-line-svg right">
            <svg viewBox="0 0 100 800" preserveAspectRatio="none">
              <path
                class="line-path"
                d="M50,0 Q50,400 50,800"
                stroke="#313131"
                stroke-width="3"
                fill="none"
              />
              <path
                class="line-hit"
                d="M50,0 Q50,400 50,800"
                stroke="transparent"
                stroke-width="40"
                fill="none"
              />
            </svg>
          </div>

          <section class="hero_autoportrait">
            <h1 data-animate-text="">Autoportrait</h1>
            <p data-animate-text="">William Utermohlen</p>
            <div class="scroll-hint-autoportrait">
              <span>Scroll</span>
              <div class="line"></div>
            </div>
          </section>

          <div class="ligne-h" id="ligne-h1-autoportrait">
            <svg viewBox="0 0 800 400">
              <path
                class="line-path"
                d="M0,200 Q400,200 800,200"
                stroke="#313131"
                stroke-width="1"
                fill="none"
              />
              <path
                class="line-hit"
                d="M0,200 Q400,200 800,200"
                stroke="transparent"
                stroke-width="30"
                fill="none"
              />
            </svg>
          </div>

          <section class="autoportrait-content">
            <div class="autoportrait-text-container">
              <p data-animate-text>Placeholder — contenu à venir</p>
            </div>
          </section>

          <!-- footer -->
          <div class="ligne-h" id="ligne-h-footer">
            <svg viewBox="0 0 800 400">
              <path
                class="line-path"
                d="M0,200 Q400,200 800,200"
                stroke="#313131"
                stroke-width="1"
                fill="none"
              />
              <path
                class="line-hit"
                d="M0,200 Q400,200 800,200"
                stroke="transparent"
                stroke-width="30"
                fill="none"
              />
            </svg>
          </div>
          <footer class="footer">
            <div class="container">
              <div class="text_nav">
                <h2>Page précédente</h2>
                <div class="text_central">
                  <h1>Prochaine page</h1>
                </div>
                <h2>Page suivante</h2>
              </div>
            </div>
            <div class="footerimg">
              <img src="image/footer/fusain.png" alt="flower" />
            </div>
            <div class="text_footer">
              <h3>William Utermohlen</h3>
              <h3>la galerie des souvenirs</h3>
              <h3>Maxime Cordy</h3>
            </div>
          </footer>
        </div>
      </div>
    </div>
    <script type="module" src="js/info.js"></script>
    <script type="module" src="js/text-animation-addon.js"></script>
    <script type="module" src="js/main.js"></script>
  </body>
</html>
